# Chain-of-10 generic benchmark model (Task 32).
#
# Replaces the old (now-removed) fixture-generator crate's streaming
# generator's uniform table_000..table_NNN chain: N independent root tables
# named table_NNN, each with id/name/value/description columns, and (for t
# > 0) a parent_id column FK-referencing table_{t-1}'s id — a simple linear
# FK chain, not a fan-out hierarchy. Row count per table is uniform and
# controlled entirely by the
# CLI's --rows override (every table_NNN here is a root table, so
# `generate --rows N` sets every table's count to N — see
# src/generate/compiler.rs::resolve_root_count). The `count: 1` placeholder
# below is never used directly by the benchmark scripts, which always pass
# --rows explicitly.
#
# Used by scripts/profile-memory.sh, scripts/bench-validate-memory.sh, and
# scripts/verify-io-strategies.sh for the tiny/small/medium/large/xlarge/huge
# presets (10 tables).

version: 1
kind: model
source: { dialect: postgres }
seed: 42
defaults: { inference: disabled }

tables:

  table_000:
    rows: { kind: fixed, count: 1 }
    schema:
      name: table_000
      primary_key: [id]
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true, identity: true }
        - { name: name, type: "varchar(100)", nullable: false }
        - { name: value, type: integer, nullable: false }
        - { name: description, type: text, nullable: true }
    columns:
      id:
        generator: { kind: sequence, start: 1 }
      name:
        generator: { kind: string, min_length: 5, max_length: 40 }
      value:
        generator: { kind: integer, min: 0, max: 1000000 }
      description:
        generator: { kind: text.sentence }

  table_001:
    rows: { kind: fixed, count: 1 }
    schema:
      name: table_001
      primary_key: [id]
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true, identity: true }
        - { name: name, type: "varchar(100)", nullable: false }
        - { name: value, type: integer, nullable: false }
        - { name: description, type: text, nullable: true }
        - { name: parent_id, type: bigint, nullable: false }
      relationships:
        - { name: fk_table_001_parent, columns: [parent_id], referenced_table: table_000, referenced_columns: [id] }
    columns:
      id:
        generator: { kind: sequence, start: 1 }
      name:
        generator: { kind: string, min_length: 5, max_length: 40 }
      value:
        generator: { kind: integer, min: 0, max: 1000000 }
      description:
        generator: { kind: text.sentence }
      parent_id:
        generator: { kind: relation.foreign_key, relationship: fk_table_001_parent }
    relationships:
      - { name: fk_table_001_parent, columns: [parent_id], references: { table: table_000, columns: [id] } }

