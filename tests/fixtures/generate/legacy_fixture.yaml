        - { name: tenant_id, type: bigint, nullable: false }
        - { name: parent_id, type: bigint, nullable: true }
        - { name: name, type: "varchar(120)", nullable: false }
        - { name: level, type: integer, nullable: false }
        - { name: created_at, type: "timestamp without time zone", nullable: false , family: date_time }
        - { name: updated_at, type: "timestamp without time zone", nullable: false , family: date_time }
      relationships:
        - { name: category_tenant, columns: [tenant_id], referenced_table: tenants, referenced_columns: [id] }
    relationships:
      - { name: category_tenant, columns: [tenant_id], references: { table: tenants, columns: [id] } }
    columns:
      id:
        generator: { kind: sequence, start: 1 }
      # Self-referential parent_id is always NULL here — see the module
      # header for why a flat category list preserves every property the
      # migrated tests actually check.
      parent_id:
        generator: { kind: constant }
      name:
        generator: { kind: text.word }
      level:
        generator: { kind: integer, min: 0, max: 0 }
      created_at:
        generator: { kind: datetime }
      updated_at:
        generator: { kind: datetime }

  products:
    rows:
      kind: relation.children
      parent: tenants
      count: 30
