# Legacy fixture contract (Task 31).
#
# Snapshot of the shape the old `test_data_gen` crate (crates/test_data_gen)
# produced, re-expressed as a `kind: model` document for the public
# `sql_splitter::generate` API. This is what `tests/support/generated_fixture.rs`
# loads; `tests/fixture_migration_test.rs` characterizes it against the old
# crate so Task 32 can delete `crates/test_data_gen` with confidence.
#
# Old shape it replaces (see crates/test_data_gen/src/generator.rs):
#   - 4 global tables: permissions, roles, role_permissions, currencies
#   - 1 tenant root: tenants
#   - 11 per-tenant tables: users, user_roles, categories, products,
#     customers, orders, order_items, projects, tasks, folders, comments
#   - Scale::Small ~= 3 tenants, ~5 users/tenant, ~10 orders/tenant, etc.
#     (see Scale::* in the old crate for the exact per-scale formulas)
#
# Deliberate simplifications from the old generator (documented, not silent):
#   - Self-referential columns (categories.parent_id, folders.parent_id,
#     comments.parent_id) are always NULL here instead of forming a random
#     tree. None of the three migrated tests inspect hierarchy depth/shape,
#     only that the dump parses and FK-checks clean, so a flat tree preserves
#     every property they assert.
#   - Cross-branch FK columns (e.g. tasks.tenant_id, products.category_id)
#     reference *some* valid row in the target table rather than one scoped to
#     the same tenant. The old generator kept those in-tenant; no consuming
#     test checks tenant-consistency across tables, only FK existence, which
#     this preserves.
#   - Junction tables (role_permissions, user_roles) generate independent
#     pairs rather than the old crate's "no duplicate pair, admin gets every
#     permission" rules — no consuming test inspects junction semantics.
#   - The old crate's `RenderConfig::mssql_production()` profile (GO batch
#     separators, `[dbo].` schema prefix, named `CONSTRAINT PK_x` clauses,
#     `ON [PRIMARY]` filegroup) has no equivalent in the public renderer; the
#     one test asserting it (`test_mssql_generator_production_style`) is left
#     on the old crate directly — see task-31-report.md.
#
# `source: { dialect: postgres }` is set (types below are authored in
# PostgreSQL spelling) purely so an explicit `.output_dialect()` request maps
# every column type across dialects via the existing convert/types.rs
# TypeMapper, instead of rendering the PostgreSQL spelling verbatim into every
# target dialect. This reproduces the old renderer's per-dialect type choices
# closely: boolean -> TINYINT(1)/INTEGER/BIT, timestamp ->
# DATETIME/TIMESTAMP/TEXT/DATETIME2, text -> .../NVARCHAR(MAX) for MSSQL.

version: 1
kind: model
source: { dialect: postgres }
seed: 42
defaults: { inference: disabled }

tables:

  # ---------------------------------------------------------------------
  # Global tables (no tenant association)
  # ---------------------------------------------------------------------

  permissions:
    rows: { kind: fixed, count: 10 }
    schema:
      name: permissions
      primary_key: [id]
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true, identity: true }
        - { name: name, type: "varchar(100)", nullable: false }
        - { name: description, type: text, nullable: false }
    columns:
      id:
        generator: { kind: sequence, start: 1 }
      name:
        generator: { kind: text.word }
      description:
        generator: { kind: text.sentence }

  roles:
    rows: { kind: fixed, count: 5 }
    schema:
      name: roles
      primary_key: [id]
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true, identity: true }
        - { name: tenant_id, type: bigint, nullable: true }
        - { name: name, type: "varchar(100)", nullable: false }
        - { name: is_system, type: boolean, nullable: false }
        - { name: created_at, type: "timestamp without time zone", nullable: false , family: date_time }
        - { name: updated_at, type: "timestamp without time zone", nullable: false , family: date_time }
    columns:
      id:
        generator: { kind: sequence, start: 1 }
      tenant_id:
        generator: { kind: constant }
      name:
        generator:
          kind: weighted_choice
          choices:
            - { value: admin, weight: 0.2 }
            - { value: manager, weight: 0.2 }
            - { value: member, weight: 0.4 }
            - { value: viewer, weight: 0.2 }
      is_system:
        generator: { kind: boolean, probability: 1.0 }
      created_at:
        generator: { kind: datetime }
      updated_at:
        generator: { kind: datetime }

  role_permissions:
    rows: { kind: fixed, count: 20 }
    schema:
      name: role_permissions
      primary_key: [role_id, permission_id]
      columns:
        - { name: role_id, type: bigint, nullable: false, primary_key: true }
        - { name: permission_id, type: bigint, nullable: false, primary_key: true }
      relationships:
        - { name: role_permission_role, columns: [role_id], referenced_table: roles, referenced_columns: [id] }
        - { name: role_permission_permission, columns: [permission_id], referenced_table: permissions, referenced_columns: [id] }
    relationships:
      - { name: role_permission_role, columns: [role_id], references: { table: roles, columns: [id] } }
      - { name: role_permission_permission, columns: [permission_id], references: { table: permissions, columns: [id] } }
    planners:
      - kind: relation.junction_pair
        columns: { left: role_id, right: permission_id }
        left_relationship: role_permission_role
        right_relationship: role_permission_permission

  currencies:
    rows: { kind: fixed, count: 5 }
    schema:
      name: currencies
      primary_key: [id]
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true, identity: true }
        - { name: code, type: "varchar(3)", nullable: false }
        - { name: name, type: "varchar(100)", nullable: false }
        - { name: symbol, type: "varchar(10)", nullable: false }
    columns:
      id:
        generator: { kind: sequence, start: 1 }
      code:
        generator: { kind: text.word }
      name:
        generator: { kind: text.word }
      symbol:
        generator: { kind: text.word }

  # ---------------------------------------------------------------------
  # Tenant root
  # ---------------------------------------------------------------------

  tenants:
    rows: { kind: fixed, count: 3 }
    schema:
      name: tenants
      primary_key: [id]
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true, identity: true }
        - { name: name, type: "varchar(150)", nullable: false }
        - { name: slug, type: "varchar(160)", nullable: false, unique: true }
        - { name: created_at, type: "timestamp without time zone", nullable: false , family: date_time }
        - { name: updated_at, type: "timestamp without time zone", nullable: false , family: date_time }
    columns:
      id:
        generator: { kind: sequence, start: 1 }
      name:
        generator: { kind: company.name }
      slug:
        generator: { kind: text.slug }
        modifiers:
          - { kind: unique, attempts: 20, on_exhaustion: error }
      created_at:
        generator: { kind: datetime }
      updated_at:
        generator: { kind: datetime }

  # ---------------------------------------------------------------------
  # Per-tenant tables
  # ---------------------------------------------------------------------

  users:
    rows:
      kind: relation.children
      parent: tenants
      count: 15
      distribution: { kind: fixed, mean: 5.0, min: 1.0, max: 100.0 }
    schema:
      name: users
      primary_key: [id]
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true, identity: true }
        - { name: tenant_id, type: bigint, nullable: false }
        - { name: email, type: "varchar(255)", nullable: false, unique: true }
        - { name: name, type: "varchar(160)", nullable: false }
        - { name: role, type: "varchar(30)", nullable: false }
        - { name: active, type: boolean, nullable: false }
        - { name: created_at, type: "timestamp without time zone", nullable: false , family: date_time }
        - { name: updated_at, type: "timestamp without time zone", nullable: false , family: date_time }
        - { name: deleted_at, type: "timestamp without time zone", nullable: true , family: date_time }
      relationships:
        - { name: user_tenant, columns: [tenant_id], referenced_table: tenants, referenced_columns: [id] }
    relationships:
      - { name: user_tenant, columns: [tenant_id], references: { table: tenants, columns: [id] } }
    columns:
      id:
        generator: { kind: sequence, start: 1 }
      email:
        generator: { kind: internet.email }
        modifiers:
          - { kind: unique, attempts: 20, on_exhaustion: error }
      name:
        generator: { kind: person.full_name }
      role:
        generator:
          kind: weighted_choice
          choices:
            - { value: admin, weight: 0.1 }
            - { value: manager, weight: 0.2 }
            - { value: member, weight: 0.7 }
      active:
        generator: { kind: boolean, probability: 0.9 }
      created_at:
        generator: { kind: datetime }
      updated_at:
        generator: { kind: datetime }
      deleted_at:
        generator: { kind: datetime }
        modifiers:
          - { kind: null_rate, rate: 0.95 }

  user_roles:
    rows: { kind: fixed, count: 20 }
    schema:
      name: user_roles
      primary_key: [user_id, role_id]
      columns:
        - { name: user_id, type: bigint, nullable: false, primary_key: true }
        - { name: role_id, type: bigint, nullable: false, primary_key: true }
      relationships:
        - { name: user_role_user, columns: [user_id], referenced_table: users, referenced_columns: [id] }
        - { name: user_role_role, columns: [role_id], referenced_table: roles, referenced_columns: [id] }
    relationships:
      - { name: user_role_user, columns: [user_id], references: { table: users, columns: [id] } }
      - { name: user_role_role, columns: [role_id], references: { table: roles, columns: [id] } }
    planners:
