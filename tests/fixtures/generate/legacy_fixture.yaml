        - { name: category_id, type: bigint, nullable: false }
        - { name: sku, type: "varchar(40)", nullable: false }
        - { name: name, type: "varchar(160)", nullable: false }
        - { name: price, type: "decimal(10,2)", nullable: false }
        - { name: active, type: boolean, nullable: false }
        - { name: created_at, type: "timestamp without time zone", nullable: false , family: date_time }
        - { name: updated_at, type: "timestamp without time zone", nullable: false , family: date_time }
      relationships:
        - { name: product_tenant, columns: [tenant_id], referenced_table: tenants, referenced_columns: [id] }
        - { name: product_category, columns: [category_id], referenced_table: categories, referenced_columns: [id] }
    relationships:
      - { name: product_tenant, columns: [tenant_id], references: { table: tenants, columns: [id] } }
      - { name: product_category, columns: [category_id], references: { table: categories, columns: [id] } }
    columns:
      id:
        generator: { kind: sequence, start: 1 }
      category_id:
        generator: { kind: relation.foreign_key, relationship: product_category }
      sku:
        generator: { kind: commerce.sku }
      name:
        generator: { kind: commerce.product_name }
      price:
        generator: { kind: decimal, min: 5, max: 500, scale: 2 }
      active:
        generator: { kind: boolean, probability: 0.85 }
      created_at:
        generator: { kind: datetime }
      updated_at:
        generator: { kind: datetime }

  customers:
    rows:
      kind: relation.children
      parent: tenants
      count: 15
      distribution: { kind: fixed, mean: 5.0, min: 1.0, max: 100.0 }
    schema:
      name: customers
      primary_key: [id]
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true, identity: true }
        - { name: tenant_id, type: bigint, nullable: false }
        - { name: name, type: "varchar(160)", nullable: false }
        - { name: email, type: "varchar(255)", nullable: false }
        - { name: phone, type: "varchar(30)", nullable: false }
        - { name: created_at, type: "timestamp without time zone", nullable: false , family: date_time }
        - { name: updated_at, type: "timestamp without time zone", nullable: false , family: date_time }
      relationships:
        - { name: customer_tenant, columns: [tenant_id], referenced_table: tenants, referenced_columns: [id] }
    relationships:
      - { name: customer_tenant, columns: [tenant_id], references: { table: tenants, columns: [id] } }
    columns:
      id:
        generator: { kind: sequence, start: 1 }
      name:
