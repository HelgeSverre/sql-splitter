        generator: { kind: sequence, start: 1 }
      # Self-referential parent_id is always NULL — see module header.
      parent_id:
        generator: { kind: constant }
      user_id:
        generator: { kind: relation.foreign_key, relationship: comment_user }
      body:
        generator: { kind: text.paragraph }
      created_at:
        generator: { kind: datetime }
    planners:
      # Polymorphic: comment attaches to a task or a project, matching the
      # old generator's commentable_type/commentable_id dispatch.
      - kind: relation.polymorphic_pair
        columns: { type: commentable_type, id: commentable_id }
        targets:
          - { type: task, table: tasks, weight: 0.7 }
          - { type: project, table: projects, weight: 0.3 }
