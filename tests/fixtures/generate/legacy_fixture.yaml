        - { name: tenant_id, type: bigint, nullable: false }
        - { name: customer_id, type: bigint, nullable: false }
        - { name: order_number, type: "varchar(40)", nullable: false }
        - { name: status, type: "varchar(20)", nullable: false }
        - { name: total, type: "decimal(10,2)", nullable: false }
        - { name: created_at, type: "timestamp without time zone", nullable: false , family: date_time }
        - { name: updated_at, type: "timestamp without time zone", nullable: false , family: date_time }
      relationships:
        - { name: order_tenant, columns: [tenant_id], referenced_table: tenants, referenced_columns: [id] }
        - { name: order_customer, columns: [customer_id], referenced_table: customers, referenced_columns: [id] }
    relationships:
