# Stress fixture 7 of 7 — Reflow: 99-table field-service ERP (LARGEST SCHEMA).
#
# Stress axis: ENORMOUS TABLE COUNT + DENSE FK GRAPH.
# This is the hand-authored model of the largest real dump available
# (reflow-latest-production.sql: 99 tables, 156 foreign keys) — a Norwegian
# car-wash / field-service management SaaS. It is exactly the shape that
#   `sql-splitter generate reflow.sql --emit-config reflow_erp.yaml`
# will eventually produce from the dump itself (structure only; no source
# values are reproduced).
#
# Coverage: 99 tables, every declared FK as a named relationship, self-
# referential trees (comments, folders, calendar_events, invoices, users),
# polymorphic morphs, join tables, high-volume telemetry, and planners on
# the tables where the fit is unambiguous:
#   temporal.interval  -> wash_unit_uptimes, assignments, tracked_time
#   progress_counters  -> imports, exports
#   hierarchy.tree     -> comments, folders
#   geo.coordinate_pair-> wash_units
#   file.metadata      -> documents, calendar_event_attachments
#   polymorphic_pair   -> activity_log, taggables, contactables, watch
#   junction_pair      -> gamification_reward_user, role_has_permissions,
#                         help_article_related, support_case_user,
#                         wash_unit_log_entry_result
#
# `defaults.inference: schema` lets the descriptive columns (names, emails,
# timestamps, money, json, text, flags) be owned by schema/name/constraint
# heuristics that need NO source data — so this stays a complete hand-authored
# model without spelling out a generator for all ~1,400 columns. Explicit
# generators are given only for primary keys and foreign keys.
#
# PROVISIONAL: Phase-3B planner argument shapes follow the documented style.

version: 1
kind: model

source:
  dialect: mysql
  fingerprint_policy: ignore

output:
  dialect: mysql
  mode: schema_and_data
  batch_size: 1000

seed: 990099

defaults:
  inference: schema

