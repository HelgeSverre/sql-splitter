# Stress fixture 2 of 6 — Grocery commerce & price tracking.
#
# Stress axis: EXACT MINOR-UNIT MONEY + STATISTICAL DISTRIBUTIONS.
# Anchored on the kassalapp grocery/price-tracking shape (structure only).
#
# Exercises:
#   - commerce.order_family        (receipts -> receipt_items, exact decimals)
#   - weighted_choice / choice     (categories, statuses, units)
#   - histogram / normal / lognormal (prices, quantities, weights)
#   - temporal.interval            (price-alert active windows, DST-crossing)
#   - geo.coordinate_pair          (physical store locations)
#   - file.metadata                (product images)
#   - pattern                      (SKU + EAN-13 barcode)
#   - relation.children with every distribution kind
#   - deep FK chains (stores -> prices -> price_alerts -> notifications)
#
# PROVISIONAL: geo.coordinate_pair / file.metadata / temporal.interval-with-open
# argument shapes follow the documented planner style; interval is normative.

version: 1
kind: model

source:
  dialect: mysql
  fingerprint_policy: ignore

output:
  dialect: postgres
  mode: schema_and_data
  inserts: copy
  batch_size: 2000

seed: 4455661

defaults:
  inference: disabled

tables:

  brands:
    rows: { kind: fixed, count: 400 }
    schema:
      name: brands
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: name, type: varchar(120), nullable: false, unique: true }
        - { name: country, type: varchar(2), nullable: true }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      name:
        generator: { kind: company.name }
        modifiers:
          - { kind: unique, attempts: 32, on_exhaustion: error }
      country:
        generator: { kind: address.country }
        modifiers:
          - { kind: null_rate, probability: 0.25 }

  categories:
    # Self-referential category tree.
    rows: { kind: fixed, count: 300 }
    schema:
      name: categories
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: parent_id, type: bigint, nullable: true }
        - { name: name, type: varchar(120), nullable: false }
        - { name: depth, type: integer, nullable: false }
    relationships:
      - name: category_parent
        columns: [parent_id]
        references: { table: categories, columns: [id] }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      name: { generator: { kind: text.word } }
    planners:
      - kind: hierarchy.tree
        relationship: category_parent
        depth_column: depth
        root_ratio: 0.08
        max_depth: 4
        branching: { kind: histogram, mean: 5, min: 0, max: 20 }

  stores:
    rows: { kind: fixed, count: 1200 }
    schema:
      name: stores
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: name, type: varchar(160), nullable: false }
        - { name: chain, type: varchar(60), nullable: false }
        - { name: address_line1, type: varchar(200), nullable: false }
        - { name: city, type: varchar(120), nullable: false }
        - { name: postcode, type: varchar(12), nullable: false }
        - { name: country, type: varchar(2), nullable: false }
        - { name: latitude, type: "decimal(9,6)", nullable: false }
        - { name: longitude, type: "decimal(9,6)", nullable: false }
        - { name: opened_at, type: date, nullable: true }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      name: { generator: { kind: company.name } }
      chain:
        generator:
          kind: weighted_choice
          values:
            - { value: rema, weight: 0.25 }
            - { value: kiwi, weight: 0.25 }
            - { value: coop, weight: 0.2 }
            - { value: meny, weight: 0.15 }
            - { value: bunnpris, weight: 0.15 }
      address_line1: { generator: { kind: address.line1 } }
      city: { generator: { kind: address.city } }
      postcode: { generator: { kind: address.postcode } }
      country: { generator: { kind: constant, value: NO } }
      opened_at:
        generator: { kind: date }
        modifiers:
          - { kind: null_rate, probability: 0.10 }
    planners:
      # Coherent (latitude, longitude) inside a Norway-ish bounding box.
      - kind: geo.coordinate_pair
        columns:
          latitude: latitude
          longitude: longitude
        bounding_box: { min_lat: 57.9, max_lat: 71.2, min_lon: 4.5, max_lon: 31.1 }
        precision: 6

  products:
    rows: { kind: fixed, count: 60000 }
    schema:
      name: products
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: brand_id, type: bigint, nullable: true }
        - { name: category_id, type: bigint, nullable: false }
        - { name: name, type: varchar(200), nullable: false }
        - { name: sku, type: varchar(32), nullable: false, unique: true }
        - { name: ean, type: char(13), nullable: false, unique: true }
        - { name: unit, type: varchar(12), nullable: false }
        - { name: net_weight_g, type: integer, nullable: true }
        - { name: image_name, type: varchar(255), nullable: true }
        - { name: image_size, type: integer, nullable: true }
        - { name: image_mime, type: varchar(80), nullable: true }
        - { name: created_at, type: datetime, nullable: false }
        - { name: updated_at, type: datetime, nullable: false }
    relationships:
      - name: product_brand
        columns: [brand_id]
        references: { table: brands, columns: [id] }
      - name: product_category
        columns: [category_id]
        references: { table: categories, columns: [id] }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      brand_id:
        generator: { kind: relation.foreign_key, relationship: product_brand, nullable: true, null_rate: 0.1 }
      category_id:
        generator: { kind: relation.foreign_key, relationship: product_category }
      name: { generator: { kind: commerce.product_name } }
      sku:
        generator: { kind: pattern, pattern: "SKU-[A-Z]{3}-[0-9]{6}" }
        modifiers:
          - { kind: unique, attempts: 32, on_exhaustion: error }
      ean:
        generator: { kind: pattern, pattern: "[0-9]{13}" }
        modifiers:
          - { kind: unique, attempts: 32, on_exhaustion: error }
      unit:
        generator:
          kind: weighted_choice
          values:
            - { value: stk, weight: 0.5 }
            - { value: kg, weight: 0.2 }
            - { value: l, weight: 0.15 }
            - { value: pk, weight: 0.15 }
      net_weight_g:
        generator: { kind: lognormal, min: 10, max: 20000 }
        modifiers:
          - { kind: null_rate, probability: 0.2 }
          - { kind: round }
    planners:
      - kind: temporal.timestamps
        columns:
          created_at: created_at
          updated_at: updated_at
        range: { min: 2019-01-01T00:00:00Z, max: 2026-01-01T00:00:00Z }
      - kind: file.metadata
        columns:
          name: image_name
          size: image_size
          mime_type: image_mime
        null_probability: 0.3
        size: { kind: lognormal, min: 4096, max: 4194304 }
        extensions: [jpg, png, webp]

  product_prices:
    # One observed price per (product, store) sampling — lognormal money shape.
    rows:
      kind: relation.children
      parent: products
      count: 900000
      distribution: { kind: histogram, mean: 15, min: 0, max: 60 }
    schema:
      name: product_prices
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: product_id, type: bigint, nullable: false }
        - { name: store_id, type: bigint, nullable: false }
        - { name: price, type: "decimal(10,2)", nullable: false }
        - { name: currency, type: char(3), nullable: false }
        - { name: is_on_sale, type: boolean, nullable: false }
        - { name: observed_at, type: datetime, nullable: false }
    relationships:
      - name: price_product
        columns: [product_id]
        references: { table: products, columns: [id] }
      - name: price_store
        columns: [store_id]
        references: { table: stores, columns: [id] }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      product_id:
        generator: { kind: relation.foreign_key, relationship: price_product }
      store_id:
        generator: { kind: relation.foreign_key, relationship: price_store }
      price:
        generator: { kind: lognormal, min: 0.5, max: 999.0, scale: 2 }
        modifiers:
          - { kind: clamp, min: 0.5, max: 999.0 }
      currency: { generator: { kind: constant, value: NOK } }
      is_on_sale: { generator: { kind: boolean, probability: 0.18 } }
      observed_at: { generator: { kind: datetime } }

  price_alerts:
    # temporal.interval: each alert has an active window (some still running).
    rows: { kind: fixed, count: 50000 }
    schema:
      name: price_alerts
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: user_email, type: varchar(255), nullable: false }
        - { name: product_id, type: bigint, nullable: false }
        - { name: threshold, type: "decimal(10,2)", nullable: false }
        - { name: started_at, type: datetime, nullable: false }
        - { name: ended_at, type: datetime, nullable: true }
        - { name: duration_seconds, type: bigint, nullable: true }
        - { name: is_active, type: boolean, nullable: false }
    relationships:
      - name: alert_product
        columns: [product_id]
        references: { table: products, columns: [id] }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      user_email: { generator: { kind: internet.email } }
      product_id:
        generator: { kind: relation.foreign_key, relationship: alert_product }
      threshold:
        generator: { kind: normal, mean: 45.0, stddev: 20.0, min: 1.0, max: 500.0, scale: 2 }
    planners:
      - kind: temporal.interval
        columns:
          start: started_at
          end: ended_at
          duration: duration_seconds
          open: is_active
        start:
          kind: range
          min: 2023-01-01T00:00:00Z
          max: 2026-01-01T00:00:00Z
        duration:
          kind: histogram
          unit: seconds
          min: 3600
          max: 31536000
        open_probability: 0.4
        end_inclusive: true
        timezone: Europe/Oslo

  price_alert_notifications:
    rows:
      kind: relation.children
      parent: price_alerts
      count: 120000
      distribution: { kind: poisson, mean: 2.4, min: 0, max: 40 }
    schema:
      name: price_alert_notifications
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: price_alert_id, type: bigint, nullable: false }
        - { name: channel, type: varchar(12), nullable: false }
        - { name: sent_at, type: datetime, nullable: false }
    relationships:
      - name: notification_alert
        columns: [price_alert_id]
        references: { table: price_alerts, columns: [id] }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      price_alert_id:
        generator: { kind: relation.foreign_key, relationship: notification_alert }
      channel:
        generator:
          kind: weighted_choice
          values:
            - { value: email, weight: 0.7 }
            - { value: push, weight: 0.25 }
            - { value: sms, weight: 0.05 }
      sent_at: { generator: { kind: datetime } }

  label_product:
    # Junction: labels <-> products.
    rows: { kind: fixed, count: 40000 }
    schema:
      name: label_product
      columns:
        - { name: label_id, type: bigint, nullable: false, primary_key: true }
        - { name: product_id, type: bigint, nullable: false, primary_key: true }
    relationships:
      - name: lp_label
        columns: [label_id]
        references: { table: labels, columns: [id] }
      - name: lp_product
        columns: [product_id]
        references: { table: products, columns: [id] }
    planners:
      - kind: relation.junction_pair
        left: lp_label
        right: lp_product
        unique: true

  labels:
    rows: { kind: fixed, count: 60 }
    schema:
      name: labels
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: name, type: varchar(60), nullable: false, unique: true }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      name:
        generator: { kind: text.word }
        modifiers:
          - { kind: unique, attempts: 16, on_exhaustion: error }

  receipts:
    # commerce.order_family parent: exact minor-unit totals over receipt_items.
    rows: { kind: fixed, count: 200000 }
    schema:
      name: receipts
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: store_id, type: bigint, nullable: false }
        - { name: purchased_at, type: datetime, nullable: false }
        - { name: subtotal, type: "decimal(12,2)", nullable: false }
        - { name: discount_total, type: "decimal(12,2)", nullable: false }
        - { name: tax_total, type: "decimal(12,2)", nullable: false }
        - { name: grand_total, type: "decimal(12,2)", nullable: false }
        - { name: currency, type: char(3), nullable: false }
    relationships:
      - name: receipt_store
        columns: [store_id]
        references: { table: stores, columns: [id] }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      store_id:
        generator: { kind: relation.foreign_key, relationship: receipt_store }
      purchased_at: { generator: { kind: datetime } }
      currency: { generator: { kind: constant, value: NOK } }
      # subtotal / discount_total / tax_total / grand_total owned by order_family.
    planners:
      - kind: commerce.order_family
        children: receipt_items
        relationship: receipt_item_receipt
        columns:
          subtotal: subtotal
          discount: discount_total
          tax: tax_total
          total: grand_total
        child_columns:
          quantity: quantity
          unit_price: unit_price
          discount: discount_amount
          tax: tax_amount
          line_total: line_total
        currency_scale: 2
        rounding: largest_remainder
        tax:
          kind: weighted_choice
          rates: [0.0, 0.12, 0.15, 0.25]
          weights: [0.05, 0.25, 0.35, 0.35]

  receipt_items:
    rows:
      kind: relation.children
      parent: receipts
      count: 1400000
      distribution: { kind: observed, mean: 7.0, min: 1, max: 80 }
    schema:
      name: receipt_items
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: receipt_id, type: bigint, nullable: false }
        - { name: product_id, type: bigint, nullable: true }
        - { name: description, type: varchar(200), nullable: false }
        - { name: quantity, type: integer, nullable: false }
        - { name: unit_price, type: "decimal(12,2)", nullable: false }
        - { name: discount_amount, type: "decimal(12,2)", nullable: false }
        - { name: tax_amount, type: "decimal(12,2)", nullable: false }
        - { name: line_total, type: "decimal(12,2)", nullable: false }
    relationships:
      - name: receipt_item_receipt
        columns: [receipt_id]
        references: { table: receipts, columns: [id] }
      - name: receipt_item_product
        columns: [product_id]
        references: { table: products, columns: [id] }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      receipt_id:
        generator: { kind: relation.foreign_key, relationship: receipt_item_receipt }
      product_id:
        generator: { kind: relation.foreign_key, relationship: receipt_item_product, nullable: true, null_rate: 0.05 }
      description: { generator: { kind: commerce.product_name } }
      # quantity / unit_price / discount / tax / line_total owned by order_family.

  subscriptions:
    rows: { kind: fixed, count: 9000 }
    schema:
      name: subscriptions
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: user_email, type: varchar(255), nullable: false }
        - { name: tier, type: varchar(20), nullable: false }
        - { name: amount, type: "decimal(8,2)", nullable: false }
        - { name: started_at, type: datetime, nullable: false }
        - { name: cancelled_at, type: datetime, nullable: true }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      user_email: { generator: { kind: internet.email } }
      tier:
        generator:
          kind: weighted_choice
          values:
            - { value: plus, weight: 0.7 }
            - { value: pro, weight: 0.3 }
      amount:
        generator:
          kind: weighted_choice
          values:
            - { value: "49.00", weight: 0.7 }
            - { value: "99.00", weight: 0.3 }
      started_at: { generator: { kind: datetime } }
    planners:
      - kind: temporal.soft_delete
        columns:
          deleted_at: cancelled_at
        deleted_probability: 0.22
