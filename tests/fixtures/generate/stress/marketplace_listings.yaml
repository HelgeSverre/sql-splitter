# Stress fixture 3 of 6 — Classifieds marketplace + listing analytics.
#
# Stress axis: WIDE / EAV SCHEMA ROBUSTNESS + POLYMORPHIC + DYNAMIC FORMS.
# Anchored on the re.sql / boatflow / reflow classifieds shapes (structure only).
#
# Exercises:
#   - EAV key-value tables (boat_properties, car_properties, form_submission_values)
#   - relation.polymorphic_pair    (media across boats/cars/pages, submissions)
#   - deep 4-level FK chains        (agency -> listing -> boat -> boat_properties)
#   - dynamic forms                 (forms -> form_fields -> submissions -> values)
#   - relation.junction_pair        (agency_user, user_website)
#   - template / pattern generators (slugs, reference codes, plate numbers)
#   - monotonic                     (page_views ordered ids / counters)
#   - many nullable FKs and wide nullable columns
#
# Optimized for the "wide" axis: many tables and columns, modest per-table rows.
# PROVISIONAL: polymorphic_pair / junction_pair argument shapes follow the
# documented planner style (only Phase-3A planners have normative YAML).

version: 1
kind: model

source:
  dialect: mysql
  fingerprint_policy: ignore

output:
  dialect: mysql
  mode: schema_and_data
  inserts: insert
  batch_size: 500

seed: 7788991

defaults:
  inference: disabled

tables:

  users:
    rows: { kind: fixed, count: 5000 }
    schema:
      name: users
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: email, type: varchar(255), nullable: false, unique: true }
        - { name: name, type: varchar(160), nullable: false }
        - { name: phone, type: varchar(32), nullable: true }
        - { name: created_at, type: datetime, nullable: false }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      email:
        generator: { kind: internet.email }
        modifiers: [{ kind: unique, attempts: 64, on_exhaustion: error }]
      name: { generator: { kind: person.full_name } }
      phone:
        generator: { kind: phone.number }
        modifiers: [{ kind: null_rate, probability: 0.3 }]
      created_at: { generator: { kind: datetime } }

  agencies:
    rows: { kind: fixed, count: 600 }
    schema:
      name: agencies
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: name, type: varchar(160), nullable: false }
        - { name: org_number, type: varchar(16), nullable: false, unique: true }
        - { name: website, type: varchar(255), nullable: true }
        - { name: contact_email, type: varchar(255), nullable: true }
        - { name: created_at, type: datetime, nullable: false }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      name: { generator: { kind: company.name } }
      org_number:
        generator: { kind: pattern, pattern: "[0-9]{9}" }
        modifiers: [{ kind: unique, attempts: 32, on_exhaustion: error }]
      website:
        generator: { kind: internet.url }
        modifiers: [{ kind: null_rate, probability: 0.2 }]
      contact_email:
        generator: { kind: internet.email }
        modifiers: [{ kind: null_rate, probability: 0.15 }]
      created_at: { generator: { kind: datetime } }

  agency_user:
    # Junction: agencies <-> users.
    rows: { kind: fixed, count: 3000 }
    schema:
      name: agency_user
      columns:
        - { name: agency_id, type: bigint, nullable: false, primary_key: true }
        - { name: user_id, type: bigint, nullable: false, primary_key: true }
        - { name: role, type: varchar(20), nullable: false }
    relationships:
      - name: au_agency
        columns: [agency_id]
        references: { table: agencies, columns: [id] }
      - name: au_user
        columns: [user_id]
        references: { table: users, columns: [id] }
    columns:
      role:
        generator:
          kind: weighted_choice
          values:
            - { value: agent, weight: 0.8 }
            - { value: manager, weight: 0.2 }
    planners:
      - kind: relation.junction_pair
        left: au_agency
        right: au_user
        unique: true

  websites:
    rows: { kind: fixed, count: 800 }
    schema:
      name: websites
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: agency_id, type: bigint, nullable: false }
        - { name: domain, type: varchar(190), nullable: false, unique: true }
        - { name: theme, type: varchar(40), nullable: false }
        - { name: settings, type: json, nullable: true }
    relationships:
      - name: website_agency
        columns: [agency_id]
        references: { table: agencies, columns: [id] }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      agency_id: { generator: { kind: relation.foreign_key, relationship: website_agency } }
      domain:
        generator: { kind: internet.domain }
        modifiers: [{ kind: unique, attempts: 32, on_exhaustion: error }]
      theme:
        generator: { kind: choice, values: [classic, modern, minimal, bold] }
      settings:
        generator: { kind: json_value }
        modifiers: [{ kind: null_rate, probability: 0.4 }]

  user_website:
    # Second junction (users <-> websites) to stress multiple junctions per model.
    rows: { kind: fixed, count: 4000 }
    schema:
      name: user_website
      columns:
        - { name: user_id, type: bigint, nullable: false, primary_key: true }
        - { name: website_id, type: bigint, nullable: false, primary_key: true }
    relationships:
      - name: uw_user
        columns: [user_id]
        references: { table: users, columns: [id] }
      - name: uw_website
        columns: [website_id]
        references: { table: websites, columns: [id] }
    planners:
      - kind: relation.junction_pair
        left: uw_user
        right: uw_website
        unique: true

  listings:
    # Parent of the polymorphic boat/car detail rows.
    rows: { kind: fixed, count: 80000 }
    schema:
      name: listings
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: agency_id, type: bigint, nullable: false }
        - { name: website_id, type: bigint, nullable: true }
        - { name: kind, type: varchar(12), nullable: false }
        - { name: reference, type: varchar(24), nullable: false, unique: true }
        - { name: title, type: varchar(200), nullable: false }
        - { name: slug, type: varchar(220), nullable: false }
        - { name: price, type: "decimal(12,2)", nullable: true }
        - { name: currency, type: char(3), nullable: false }
        - { name: status, type: varchar(16), nullable: false }
        - { name: published_at, type: datetime, nullable: true }
        - { name: created_at, type: datetime, nullable: false }
        - { name: updated_at, type: datetime, nullable: false }
        - { name: deleted_at, type: datetime, nullable: true }
    relationships:
      - name: listing_agency
        columns: [agency_id]
        references: { table: agencies, columns: [id] }
      - name: listing_website
        columns: [website_id]
        references: { table: websites, columns: [id] }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      agency_id: { generator: { kind: relation.foreign_key, relationship: listing_agency } }
      website_id:
        generator: { kind: relation.foreign_key, relationship: listing_website, nullable: true, null_rate: 0.25 }
      kind:
        generator:
          kind: weighted_choice
          values:
            - { value: car, weight: 0.65 }
            - { value: boat, weight: 0.35 }
      reference:
        generator: { kind: pattern, pattern: "REF-[0-9]{4}-[A-Z]{4}" }
        modifiers: [{ kind: unique, attempts: 32, on_exhaustion: error }]
      title: { generator: { kind: text.sentence } }
      slug:
        generator: { kind: template, template: "{reference}-{title}" }
      price:
        generator: { kind: lognormal, min: 5000, max: 5000000, scale: 2 }
        modifiers: [{ kind: null_rate, probability: 0.05 }]
      currency: { generator: { kind: constant, value: NOK } }
      status:
        generator:
          kind: weighted_choice
          values:
            - { value: draft, weight: 0.1 }
            - { value: active, weight: 0.6 }
            - { value: reserved, weight: 0.1 }
            - { value: sold, weight: 0.2 }
    planners:
      - kind: temporal.timestamps
        columns:
          created_at: created_at
          updated_at: updated_at
        range: { min: 2018-01-01T00:00:00Z, max: 2026-01-01T00:00:00Z }
      - kind: temporal.soft_delete
        columns: { deleted_at: deleted_at }
        deleted_probability: 0.12

  cars:
    rows:
      kind: relation.children
      parent: listings
      count: 52000
      distribution: { kind: fixed, count: 1, min: 0, max: 1 }
    schema:
      name: cars
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: listing_id, type: bigint, nullable: false, unique: true }
        - { name: make, type: varchar(60), nullable: false }
        - { name: model, type: varchar(60), nullable: false }
        - { name: year, type: smallint, nullable: false }
        - { name: mileage_km, type: integer, nullable: true }
        - { name: plate, type: varchar(10), nullable: true }
        - { name: fuel, type: varchar(16), nullable: false }
        - { name: gearbox, type: varchar(16), nullable: false }
    relationships:
      - name: car_listing
        columns: [listing_id]
        references: { table: listings, columns: [id] }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      listing_id: { generator: { kind: relation.foreign_key, relationship: car_listing } }
      make: { generator: { kind: choice, values: [Toyota, Volkswagen, Tesla, BMW, Volvo, Audi, Ford, Kia] } }
      model: { generator: { kind: text.word } }
      year: { generator: { kind: integer, min: 1995, max: 2026 } }
      mileage_km:
        generator: { kind: lognormal, min: 0, max: 400000 }
        modifiers: [{ kind: null_rate, probability: 0.1 }, { kind: round }]
      plate:
        generator: { kind: pattern, pattern: "[A-Z]{2}[0-9]{5}" }
        modifiers: [{ kind: null_rate, probability: 0.2 }]
      fuel:
        generator:
          kind: weighted_choice
          values:
            - { value: petrol, weight: 0.3 }
            - { value: diesel, weight: 0.3 }
            - { value: electric, weight: 0.3 }
            - { value: hybrid, weight: 0.1 }
      gearbox: { generator: { kind: choice, values: [manual, automatic] } }

  boats:
    rows:
      kind: relation.children
      parent: listings
      count: 28000
      distribution: { kind: fixed, count: 1, min: 0, max: 1 }
    schema:
      name: boats
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: listing_id, type: bigint, nullable: false, unique: true }
        - { name: builder, type: varchar(80), nullable: false }
        - { name: length_cm, type: integer, nullable: false }
        - { name: hull_material, type: varchar(24), nullable: false }
        - { name: engine_hp, type: integer, nullable: true }
        - { name: year, type: smallint, nullable: false }
    relationships:
      - name: boat_listing
        columns: [listing_id]
        references: { table: listings, columns: [id] }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      listing_id: { generator: { kind: relation.foreign_key, relationship: boat_listing } }
      builder: { generator: { kind: company.name } }
      length_cm: { generator: { kind: integer, min: 300, max: 3000 } }
      hull_material: { generator: { kind: choice, values: [grp, aluminium, wood, steel] } }
      engine_hp:
        generator: { kind: normal, mean: 150, stddev: 90, min: 5, max: 1200 }
        modifiers: [{ kind: null_rate, probability: 0.15 }, { kind: round }]
      year: { generator: { kind: integer, min: 1970, max: 2026 } }

  car_properties:
    # EAV: arbitrary key/value spec sheet, wide-ish, many rows per car.
    rows:
      kind: relation.children
      parent: cars
      count: 780000
      distribution: { kind: histogram, mean: 15, min: 0, max: 60 }
    schema:
      name: car_properties
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: car_id, type: bigint, nullable: false }
        - { name: prop_key, type: varchar(60), nullable: false }
        - { name: prop_value, type: varchar(255), nullable: true }
        - { name: value_type, type: varchar(12), nullable: false }
    relationships:
      - name: car_prop_car
        columns: [car_id]
        references: { table: cars, columns: [id] }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      car_id: { generator: { kind: relation.foreign_key, relationship: car_prop_car } }
      prop_key:
        generator:
          kind: weighted_choice
          values:
            - { value: color, weight: 0.2 }
            - { value: doors, weight: 0.15 }
            - { value: seats, weight: 0.15 }
            - { value: co2, weight: 0.15 }
            - { value: range_km, weight: 0.15 }
            - { value: warranty, weight: 0.2 }
      prop_value:
        generator: { kind: text.word }
        modifiers: [{ kind: null_rate, probability: 0.05 }]
      value_type: { generator: { kind: choice, values: [string, integer, boolean, decimal] } }

  boat_properties:
    rows:
      kind: relation.children
      parent: boats
      count: 420000
      distribution: { kind: histogram, mean: 15, min: 0, max: 60 }
    schema:
      name: boat_properties
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: boat_id, type: bigint, nullable: false }
        - { name: prop_key, type: varchar(60), nullable: false }
        - { name: prop_value, type: varchar(255), nullable: true }
    relationships:
      - name: boat_prop_boat
        columns: [boat_id]
        references: { table: boats, columns: [id] }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      boat_id: { generator: { kind: relation.foreign_key, relationship: boat_prop_boat } }
      prop_key: { generator: { kind: text.word } }
      prop_value:
        generator: { kind: text.word }
        modifiers: [{ kind: null_rate, probability: 0.05 }]

  media:
    # Polymorphic media attached to listings, cars, or boats.
    rows: { kind: fixed, count: 600000 }
    schema:
      name: media
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: mediable_type, type: varchar(24), nullable: false }
        - { name: mediable_id, type: bigint, nullable: false }
        - { name: collection, type: varchar(24), nullable: false }
        - { name: file_name, type: varchar(255), nullable: false }
        - { name: extension, type: varchar(8), nullable: false }
        - { name: mime_type, type: varchar(80), nullable: false }
        - { name: size_bytes, type: bigint, nullable: false }
        - { name: sha1, type: char(40), nullable: false }
        - { name: sort_order, type: integer, nullable: false }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      collection: { generator: { kind: choice, values: [gallery, thumbnail, document] } }
      sort_order: { generator: { kind: integer, min: 0, max: 40 } }
    planners:
      - kind: relation.polymorphic_pair
        type_column: mediable_type
        id_column: mediable_id
        targets:
          - { type: listing, references: { table: listings, columns: [id] }, weight: 0.5 }
          - { type: car, references: { table: cars, columns: [id] }, weight: 0.3 }
          - { type: boat, references: { table: boats, columns: [id] }, weight: 0.2 }
      - kind: file.metadata
        columns:
          name: file_name
          extension: extension
          mime_type: mime_type
          size: size_bytes
          hash: sha1
        size: { kind: lognormal, min: 20480, max: 15728640 }
        extensions: [jpg, jpeg, png, webp, pdf]

  forms:
    rows: { kind: fixed, count: 300 }
    schema:
      name: forms
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: website_id, type: bigint, nullable: false }
        - { name: name, type: varchar(120), nullable: false }
        - { name: created_at, type: datetime, nullable: false }
    relationships:
      - name: form_website
        columns: [website_id]
        references: { table: websites, columns: [id] }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      website_id: { generator: { kind: relation.foreign_key, relationship: form_website } }
      name: { generator: { kind: text.word } }
      created_at: { generator: { kind: datetime } }

  form_fields:
    rows:
      kind: relation.children
      parent: forms
      count: 2400
      distribution: { kind: histogram, mean: 8, min: 1, max: 40 }
    schema:
      name: form_fields
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: form_id, type: bigint, nullable: false }
        - { name: label, type: varchar(120), nullable: false }
        - { name: type, type: varchar(20), nullable: false }
        - { name: required, type: boolean, nullable: false }
        - { name: position, type: integer, nullable: false }
    relationships:
      - name: field_form
        columns: [form_id]
        references: { table: forms, columns: [id] }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      form_id: { generator: { kind: relation.foreign_key, relationship: field_form } }
      label: { generator: { kind: text.word } }
      type: { generator: { kind: choice, values: [text, email, number, select, checkbox, textarea, date] } }
      required: { generator: { kind: boolean, probability: 0.5 } }
      position: { generator: { kind: sequence, start: 1 } }

  form_submissions:
    rows:
      kind: relation.children
      parent: forms
      count: 150000
      distribution: { kind: poisson, mean: 500, min: 0, max: 20000 }
    schema:
      name: form_submissions
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: form_id, type: bigint, nullable: false }
        - { name: submitted_at, type: datetime, nullable: false }
        - { name: ip_address, type: varchar(45), nullable: true }
        - { name: user_agent, type: varchar(255), nullable: true }
    relationships:
      - name: submission_form
        columns: [form_id]
        references: { table: forms, columns: [id] }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      form_id: { generator: { kind: relation.foreign_key, relationship: submission_form } }
      submitted_at: { generator: { kind: datetime } }
      ip_address:
        generator: { kind: internet.ipv4 }
        modifiers: [{ kind: null_rate, probability: 0.1 }]
      user_agent:
        generator: { kind: internet.user_agent }
        modifiers: [{ kind: null_rate, probability: 0.1 }]

  form_submission_values:
    # EAV values keyed by field.
    rows:
      kind: relation.children
      parent: form_submissions
      count: 900000
      distribution: { kind: histogram, mean: 6, min: 0, max: 40 }
    schema:
      name: form_submission_values
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: submission_id, type: bigint, nullable: false }
        - { name: field_id, type: bigint, nullable: false }
        - { name: value, type: text, nullable: true }
    relationships:
      - name: fsv_submission
        columns: [submission_id]
        references: { table: form_submissions, columns: [id] }
      - name: fsv_field
        columns: [field_id]
        references: { table: form_fields, columns: [id] }
    columns:
      id: { generator: { kind: sequence, start: 1 } }
      submission_id: { generator: { kind: relation.foreign_key, relationship: fsv_submission } }
      field_id: { generator: { kind: relation.foreign_key, relationship: fsv_field } }
      value:
        generator: { kind: text.sentence }
        modifiers: [{ kind: null_rate, probability: 0.15 }]

  page_views:
    # High-volume analytics; monotonic id/sequence stresses ordered generation.
    rows: { kind: fixed, count: 2000000 }
    schema:
      name: page_views
      columns:
        - { name: id, type: bigint, nullable: false, primary_key: true }
        - { name: listing_id, type: bigint, nullable: true }
        - { name: website_id, type: bigint, nullable: false }
        - { name: viewed_at, type: datetime, nullable: false }
        - { name: session_hash, type: char(40), nullable: false }
        - { name: referrer, type: varchar(255), nullable: true }
        - { name: country, type: varchar(2), nullable: true }
    relationships:
      - name: pv_listing
        columns: [listing_id]
        references: { table: listings, columns: [id] }
      - name: pv_website
        columns: [website_id]
        references: { table: websites, columns: [id] }
    columns:
      id: { generator: { kind: monotonic, start: 1, step: 1 } }
      listing_id:
        generator: { kind: relation.foreign_key, relationship: pv_listing, nullable: true, null_rate: 0.2 }
      website_id: { generator: { kind: relation.foreign_key, relationship: pv_website } }
      viewed_at: { generator: { kind: datetime } }
      session_hash: { generator: { kind: identifier.hash } }
      referrer:
        generator: { kind: internet.url }
        modifiers: [{ kind: null_rate, probability: 0.4 }]
      country:
        generator: { kind: address.country }
        modifiers: [{ kind: null_rate, probability: 0.3 }]
