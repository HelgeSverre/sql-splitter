# Stress fixture 7 of 7 — Odoo-style ERP with all apps installed (LARGEST SCHEMA).
#
# Stress axis: ENORMOUS TABLE COUNT + VERY DENSE FK GRAPH.
# A hand-authored model of a full Odoo deployment (315 tables) with every
# major application enabled: Contacts, Sales, CRM, Purchase, Accounting, Inventory,
# Manufacturing, HR (employees/leaves/attendance/expenses/recruitment), Project &
# Timesheets, Point of Sale, Website/eCommerce, Payments, Subscriptions, Fleet,
# Helpdesk, Marketing (mass mailing + automation), Events, Calendar, Documents,
# Sign, Surveys, Repair, Quality, Maintenance, Loyalty, Discuss/mail, and Lunch.
#
# Odoo is open source (LGPL-3), so this schema is modeled from its documented
# conventions and is safe to publish. It is the shape that
#     sql-splitter generate odoo_dump.sql --emit-config odoo_erp.yaml
# would produce from a real Odoo PostgreSQL dump.
#
# Why it stresses the generator hard:
#   - Every business row carries Odoo's standard audit FKs (create_uid, write_uid
#     -> res_users) and most carry company_id -> res_company, so the FK graph is
#     extremely dense. res_users <-> res_company form an FK cycle (deferred).
#   - Many res_model/res_id polymorphic morphs (mail_message, mail_activity,
#     mail_followers, ir_attachment, documents.document, calendar_event).
#   - Self-referential hierarchies: res_partner, res_partner_category,
#     product_category, account_group, stock_location, hr_department,
#     project_task, website_menu, documents_folder, mail_message.
#   - *_rel many-to-many join tables with unique-pair guarantees.
#   - Exact money families: sale_order -> sale_order_line (commerce.order_family);
#     account_move/purchase_order/pos_order lines as relation.children.
#   - temporal.interval on real interval columns (hr_attendance check_in/out,
#     hr_leave, calendar_event, event_event, pos_session).
#   - workflow.progress_counters on mailing_mailing send stats.
#   - geo.coordinate_pair on res_partner (partner_latitude/partner_longitude).
#   - file.metadata on ir_attachment and documents.document.
#
# `defaults.inference: schema` owns the descriptive columns (names, emails, money,
# dates, json, flags, state selections) via schema/name heuristics that need NO
# source data, so this stays a complete hand-authored model without a generator
# for all ~2,000 columns. Explicit generators are given only for primary keys and
# foreign keys.
#
# Planner argument payloads follow the documented configuration shapes for all
# planner kinds used below.

version: 1
kind: model

source:
  dialect: postgres
  fingerprint_policy: ignore

output:
